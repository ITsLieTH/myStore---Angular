<div class="checkout">
  <h1>Checkout</h1>

  <form (ngSubmit)="submitOrder()">
    <div class="form-group">
      <label>Full Name</label>
      <input
        type="text"
        [(ngModel)]="name"
        name="name"
        required
        minlength="3"
        placeholder="Enter your full name"
        title="Full Name"
        #nameInput="ngModel"
      />
      @if (nameInput.invalid && nameInput.touched) {
        <p class="error">Name must be at least 3 characters.</p>
      }
    </div>

    <div class="form-group">
      <label>Address</label>
      <input
        type="text"
        [(ngModel)]="address"
        name="address"
        required
        placeholder="Enter your address"
        title="Address"
        #addressInput="ngModel"
      />
      @if (addressInput.invalid && addressInput.touched) {
        <p class="error">Address is required.</p>
      }
    </div>

    <div class="form-group">
      <label>Credit Card</label>
      <input
        type="text"
        [(ngModel)]="creditCard"
        name="creditCard"
        required
        minlength="16"
        maxlength="16"
        placeholder="Enter 16-digit card number"
        title="Credit Card Number"
        #cardInput="ngModel"
      />
      @if (cardInput.invalid && cardInput.touched) {
        <p class="error">Enter a valid 16-digit card number.</p>
      }
    </div>

    <button type="submit" [disabled]="!name || !address || creditCard.length < 16">
      Place Order
    </button>
  </form>
</div>
